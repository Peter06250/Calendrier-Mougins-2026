<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendriers 2026</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f8fafc; color: #1e293b; padding: 20px; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
  h1 { font-size: 20px; font-weight: 700; }
  .top-actions { display: flex; gap: 8px; }
  .btn { border: none; border-radius: 8px; padding: 9px 18px; font-size: 14px; cursor: pointer; font-weight: 600; }
  .btn-add { background: #2563eb; color: #fff; }
  .btn-add:hover { background: #1d4ed8; }
  .btn-export { background: #059669; color: #fff; }
  .btn-export:hover { background: #047857; }
  .btn-lock { background: #64748b; color: #fff; }
  .btn-lock:hover { background: #475569; }
  .btn-lock.unlocked { background: #059669; }
  .tabs { display: flex; margin-bottom: 20px; border-bottom: 2px solid #e2e8f0; }
  .tab { padding: 11px 32px; font-size: 15px; font-weight: 600; cursor: pointer; border-radius: 8px 8px 0 0; color: #94a3b8; background: #f1f5f9; border: 1.5px solid #e2e8f0; border-bottom: none; margin-right: 4px; transition: all .2s; }
  .tab:hover:not(.active) { background: #e9eef5; color: #475569; }
  .tab.active { background: #2563eb; color: #fff; border-color: #2563eb; margin-bottom: -2px; box-shadow: 0 -2px 8px rgba(37,99,235,0.15); }
  #legend { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
  .pill { display: flex; align-items: center; gap: 6px; border-radius: 20px; padding: 4px 12px; font-size: 13px; font-weight: 600; border: 1.5px solid; }
  .pill.editable { cursor: pointer; }
  .pill .del { margin-left: 4px; font-weight: 700; cursor: pointer; font-size: 14px; }
  .month-block { margin-bottom: 32px; }
  .month-title { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
  table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  th { background: #f1f5f9; padding: 6px 0; font-size: 12px; font-weight: 700; color: #64748b; border-bottom: 2px solid #e2e8f0; text-align: center; }
  td { border: 1px solid #e2e8f0; vertical-align: top; padding: 4px 3px; height: 58px; background: #fff; }
  td.empty { background: #f8fafc; }
  .day-num { font-size: 12px; font-weight: 600; color: #94a3b8; margin-bottom: 2px; }
  .stay-tag { border-radius: 4px; padding: 1px 4px; margin-bottom: 2px; font-size: 10px; font-weight: 600; line-height: 1.4; border: 1px solid; }
  .stay-tag.editable { cursor: pointer; }
  .stay-name { display: block; }
  .stay-loc { display: block; font-weight: 400; opacity: 0.85; }
  #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 100; align-items: center; justify-content: center; }
  #overlay.open { display: flex; }
  #modal { background: #fff; border-radius: 14px; padding: 28px; width: 360px; box-shadow: 0 8px 32px rgba(0,0,0,0.18); }
  #modal h2 { font-size: 18px; margin-bottom: 18px; }
  label { display: block; font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 4px; }
  input[type=text], input[type=date] { width: 100%; padding: 8px 10px; border-radius: 7px; border: 1.5px solid #cbd5e1; font-size: 14px; margin-bottom: 14px; outline: none; }
  .color-row { display: flex; gap: 8px; margin-bottom: 18px; }
  .color-dot { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 3px solid #ddd; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; }
  .btn-cancel { padding: 8px 20px; border-radius: 8px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; background: #f1f5f9; color: #334155; }
  .btn-save { padding: 8px 20px; border-radius: 8px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; background: #2563eb; color: #fff; }
  @media print {
    .top-bar button, .tabs, #legend .del, #overlay { display: none !important; }
    body { background: #fff; padding: 8px; }
  }
</style>
</head>
<body>

<div class="top-bar">
  <h1 id="page-title">📅 Calendrier Castellas 2026</h1>
  <div class="top-actions">
    <button class="btn btn-lock" id="btn-lock" onclick="toggleAuth()">🔒 Mode édition</button>
    <button class="btn btn-add" id="btn-add" onclick="openForm(null)" style="display:none">+ Ajouter un séjour</button>
    <button class="btn btn-export" onclick="exportCalendar()">⬇ Télécharger</button>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab(0)">🏡 Castellas</div>
  <div class="tab" onclick="switchTab(1)">🌲 Bois d'Embertrand</div>
</div>

<div id="legend"></div>
<div id="calendars"></div>

<div id="overlay">
  <div id="modal">
    <h2 id="modal-title">Nouveau séjour</h2>
    <label>Nom / Groupe</label>
    <input type="text" id="f-name" placeholder="ex: Rosie, Thomas & Famille...">
    <label>Lieu / Location</label>
    <input type="text" id="f-loc" placeholder="ex: Guest Bas, M1, M2...">
    <label>Date de début</label>
    <input type="date" id="f-start" min="2026-03-01" max="2026-10-31">
    <label>Date de fin</label>
    <input type="date" id="f-end" min="2026-03-01" max="2026-10-31">
    <label>Couleur</label>
    <div class="color-row" id="color-row"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeForm()">Annuler</button>
      <button class="btn-save" onclick="saveStay()">Enregistrer</button>
    </div>
  </div>
</div>

<script>
const COLORS = [
  { bg:"#dbeafe", border:"#3b82f6", text:"#1e3a8a" },
  { bg:"#dcfce7", border:"#22c55e", text:"#14532d" },
  { bg:"#fef9c3", border:"#eab308", text:"#713f12" },
  { bg:"#fce7f3", border:"#ec4899", text:"#831843" },
  { bg:"#ede9fe", border:"#8b5cf6", text:"#3b0764" },
  { bg:"#ffedd5", border:"#f97316", text:"#7c2d12" },
  { bg:"#e0f2fe", border:"#0ea5e9", text:"#0c4a6e" },
  { bg:"#f0fdf4", border:"#16a34a", text:"#052e16" },
];

const MONTHS = [
  { name:"Mars",      year:2026, month:2 },
  { name:"Avril",     year:2026, month:3 },
  { name:"Mai",       year:2026, month:4 },
  { name:"Juin",      year:2026, month:5 },
  { name:"Juillet",   year:2026, month:6 },
  { name:"Août",      year:2026, month:7 },
  { name:"Septembre", year:2026, month:8 },
  { name:"Octobre",   year:2026, month:9 },
];
const DAYS = ["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"];

const CALENDARS = [
  {
    title: "📅 Calendrier Castellas 2026",
    stays: [
      { id:1, name:"Rosie",             location:"Guest Bas", start:"2026-06-01", end:"2026-09-30", color:0 },
      { id:2, name:"Jocelyn & Famille", location:"MP",        start:"2026-07-01", end:"2026-08-15", color:1 },
      { id:3, name:"COS team building", location:"12/13 pax", start:"2026-04-09", end:"2026-04-10", color:2 },
    ]
  },
  {
    title: "🌲 Calendrier Bois d'Embertrand 2026",
    stays: [
      { id:1, name:"COS team building",                           location:"12/13 pax", start:"2026-04-09", end:"2026-04-10", color:0 },
      { id:2, name:"Thomas & Famille",                            location:"M2",        start:"2026-06-29", end:"2026-07-11", color:1 },
      { id:3, name:"Fred & Famille",                              location:"M2",        start:"2026-08-01", end:"2026-08-09", color:2 },
      { id:4, name:"Marc & Catherine + Julie, Guillaume & Melba", location:"M1",        start:"2026-08-07", end:"2026-08-14", color:3 },
      { id:5, name:"Marc & Catherine",                            location:"M1",        start:"2026-08-15", end:"2026-08-20", color:4 },
      { id:6, name:"Bob & Lysette",                               location:"M2",        start:"2026-09-05", end:"2026-09-26", color:5 },
    ]
  }
];

let activeTab = 0;
let editId = null;
let selColor = 0;
let isAuthenticated = false;
const PWD = "Nigoum@06250!";

function dateKey(y,m,d){ return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function getDays(y,m){ return new Date(y,m+1,0).getDate(); }
function getFirstDay(y,m){ let d=new Date(y,m,1).getDay(); return d===0?6:d-1; }
function staysForDay(dk){ return CALENDARS[activeTab].stays.filter(s=>s.start<=dk&&s.end>=dk); }
function nextColor(){
  const used=CALENDARS[activeTab].stays.map(s=>s.color);
  for(let i=0;i<COLORS.length;i++) if(!used.includes(i)) return i;
  return CALENDARS[activeTab].stays.length%COLORS.length;
}

function toggleAuth(){
  if(isAuthenticated){
    isAuthenticated=false;
  } else {
    const pwd=prompt("Mot de passe :");
    if(pwd===PWD) isAuthenticated=true;
    else if(pwd!==null) alert("Mot de passe incorrect.");
  }
  updateLockUI();
  render();
}

function updateLockUI(){
  const btn=document.getElementById('btn-lock');
  const addBtn=document.getElementById('btn-add');
  if(isAuthenticated){
    btn.textContent="🔓 Mode édition";
    btn.classList.add('unlocked');
    addBtn.style.display='inline-block';
  } else {
    btn.textContent="🔒 Mode édition";
    btn.classList.remove('unlocked');
    addBtn.style.display='none';
  }
}

function switchTab(idx){
  activeTab=idx;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  document.getElementById('page-title').textContent=CALENDARS[idx].title;
  render();
}

function render(){ renderLegend(); renderCalendars(); }

function renderLegend(){
  document.getElementById('legend').innerHTML=CALENDARS[activeTab].stays.map(s=>{
    const c=COLORS[s.color%COLORS.length];
    const del=isAuthenticated?`<span class="del" onclick="event.stopPropagation();deleteStay(${s.id})">×</span>`:'';
    const click=isAuthenticated?`onclick="openForm(${s.id})"`:'';
    return `<div class="pill${isAuthenticated?' editable':''}" style="background:${c.bg};border-color:${c.border};color:${c.text}" ${click}>
      ${s.name} <span style="opacity:.8;font-weight:400">(${s.location})</span>${del}
    </div>`;
  }).join('');
}

function renderCalendars(){
  document.getElementById('calendars').innerHTML=MONTHS.map(({name,year,month})=>{
    const total=getDays(year,month), first=getFirstDay(year,month);
    let cells=Array(first).fill(null);
    for(let d=1;d<=total;d++) cells.push(d);
    while(cells.length%7!==0) cells.push(null);
    const rows=[];
    for(let w=0;w<cells.length/7;w++){
      const tds=cells.slice(w*7,w*7+7).map(day=>{
        if(!day) return `<td class="empty"></td>`;
        const dk=dateKey(year,month,day);
        const tags=staysForDay(dk).map(s=>{
          const c=COLORS[s.color%COLORS.length];
          const click=isAuthenticated?`onclick="openForm(${s.id})"`:'';
          return `<div class="stay-tag${isAuthenticated?' editable':''}" style="background:${c.bg};border-color:${c.border};color:${c.text}" ${click}>
            <span class="stay-name">${s.name}</span><span class="stay-loc">${s.location}</span>
          </div>`;
        }).join('');
        return `<td><div class="day-num">${day}</div>${tags}</td>`;
      }).join('');
      rows.push(`<tr>${tds}</tr>`);
    }
    return `<div class="month-block">
      <div class="month-title">${name}</div>
      <table><thead><tr>${DAYS.map(d=>`<th>${d}</th>`).join('')}</tr></thead>
      <tbody>${rows.join('')}</tbody></table>
    </div>`;
  }).join('');
}

function openForm(id){
  editId=id;
  document.getElementById('modal-title').textContent=id?'Modifier le séjour':'Nouveau séjour';
  if(id){
    const s=CALENDARS[activeTab].stays.find(x=>x.id===id);
    document.getElementById('f-name').value=s.name;
    document.getElementById('f-loc').value=s.location;
    document.getElementById('f-start').value=s.start;
    document.getElementById('f-end').value=s.end;
    selColor=s.color;
  } else {
    document.getElementById('f-name').value='';
    document.getElementById('f-loc').value='';
    document.getElementById('f-start').value='';
    document.getElementById('f-end').value='';
    selColor=nextColor();
  }
  renderColorPicker();
  document.getElementById('overlay').classList.add('open');
}

function closeForm(){ document.getElementById('overlay').classList.remove('open'); }

function renderColorPicker(){
  document.getElementById('color-row').innerHTML=COLORS.map((c,i)=>
    `<div class="color-dot${i===selColor?' selected':''}"
      style="background:${c.bg};border-color:${i===selColor?c.border:'#ddd'}"
      onclick="selColor=${i};renderColorPicker()"></div>`
  ).join('');
}

function saveStay(){
  const name=document.getElementById('f-name').value.trim();
  const loc=document.getElementById('f-loc').value.trim();
  const start=document.getElementById('f-start').value;
  const end=document.getElementById('f-end').value;
  if(!name||!start||!end){alert('Veuillez remplir le nom et les dates.');return;}
  if(start>end){alert('La date de fin doit être après la date de début.');return;}
  const cal=CALENDARS[activeTab];
  if(editId) cal.stays=cal.stays.map(s=>s.id===editId?{...s,name,location:loc,start,end,color:selColor}:s);
  else cal.stays.push({id:Date.now(),name,location:loc,start,end,color:selColor});
  closeForm(); render();
}

function deleteStay(id){
  if(!confirm('Supprimer ce séjour ?')) return;
  CALENDARS[activeTab].stays=CALENDARS[activeTab].stays.filter(s=>s.id!==id);
  render();
}

function exportCalendar(){
  const html = document.documentElement.outerHTML
    .replace(
      /const CALENDARS = \[[\s\S]*?\];/,
      `const CALENDARS = ${JSON.stringify(CALENDARS.map(c=>({title:c.title,stays:c.stays})))};`
    )
    .replace(/let activeTab = \d+;/, `let activeTab = 0;`)
    .replace(/let isAuthenticated = \w+;/, `let isAuthenticated = false;`);
  const today=new Date();
  const dd=String(today.getDate()).padStart(2,'0');
  const mm=String(today.getMonth()+1).padStart(2,'0');
  const yyyy=today.getFullYear();
  const hh=String(today.getHours()).padStart(2,'0');
  const min=String(today.getMinutes()).padStart(2,'0');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([html],{type:'text/html;charset=utf-8'}));
  a.download=`Calendriers_2026_${dd}-${mm}-${yyyy}_${hh}-${min}.html`;
  a.click();
  URL.revokeObjectURL(a.href);
}

document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)closeForm();});
switchTab(0);
</script>
</body>
</html>
